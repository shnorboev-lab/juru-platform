services:
  - type: web
    name: juru-api
    runtime: node
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @juru/db exec prisma generate && pnpm --filter @juru/api build
    startCommand: pnpm --filter @juru/db exec prisma migrate deploy && node apps/api/dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: juru-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: juru-web
    runtime: node
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @juru/web build
    startCommand: pnpm --filter @juru/web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: juru-db
    databaseName: juru_perf
    plan: free
